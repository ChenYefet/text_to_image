events { worker_connections 64; }
http {
  upstream api {
    server api-1:8000;
    server api-2:8000;
  }
  server {
    listen 80;
    client_max_body_size 2m;
    location / {
      proxy_pass http://api;
      proxy_read_timeout 300s;
      proxy_connect_timeout 5s;
      proxy_next_upstream error timeout http_502 http_503;
      proxy_next_upstream_tries 2;
    }
  }
}
