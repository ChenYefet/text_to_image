apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama-cpp-server-deployment
  namespace: text-to-image-service
  labels:
    app.kubernetes.io/name: llama-cpp-server
    app.kubernetes.io/component: inference
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llama-cpp-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: llama-cpp-server
        app.kubernetes.io/name: llama-cpp-server
        app.kubernetes.io/component: inference
    spec:
      terminationGracePeriodSeconds: 60
      restartPolicy: Always
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
      containers:
        - name: llama-cpp-server
          image: "ghcr.io/ggml-org/llama.cpp:server"
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: "2000m"
              memory: "4Gi"
            limits:
              cpu: "4000m"
              memory: "6Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 30
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: llama-model-storage
              mountPath: /models
              readOnly: true
            - name: temporary-filesystem
              mountPath: /tmp
      volumes:
        - name: llama-model-storage
          persistentVolumeClaim:
            claimName: llama-model-pvc
        - name: temporary-filesystem
          emptyDir: {}
