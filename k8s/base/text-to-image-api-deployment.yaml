apiVersion: apps/v1
kind: Deployment
metadata:
  name: text-to-image-api-deployment
  namespace: text-to-image-service
  labels:
    app.kubernetes.io/name: text-to-image-api
    app.kubernetes.io/component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: text-to-image-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: text-to-image-api
        app.kubernetes.io/name: text-to-image-api
        app.kubernetes.io/component: api
    spec:
      terminationGracePeriodSeconds: 90
      restartPolicy: Always
      containers:
        - name: text-to-image-api
          image: "{registry}/text-to-image-api:{tag}"
          ports:
            - containerPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "4000m"
              memory: "8Gi"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          envFrom:
            - configMapRef:
                name: text-to-image-api-configmap
            - secretRef:
                name: text-to-image-api-secrets
          volumeMounts:
            - name: stable-diffusion-model-cache
              mountPath: /home/service_user/.cache/huggingface
      volumes:
        - name: stable-diffusion-model-cache
          persistentVolumeClaim:
            claimName: stable-diffusion-model-cache-pvc
