apiVersion: v1
kind: ConfigMap
metadata:
  name: text-to-image-api-configmap
data:
  # Operators shall customise these values for their environment.
  # See .env.example in the repository root for descriptions of each variable.

  # Application settings
  TEXT_TO_IMAGE_APPLICATION_HOST: "0.0.0.0"
  TEXT_TO_IMAGE_APPLICATION_PORT: "8000"
  TEXT_TO_IMAGE_CORS_ALLOWED_ORIGINS: "[]"
  TEXT_TO_IMAGE_LOG_LEVEL: "INFO"

  # Language model (llama.cpp) settings
  TEXT_TO_IMAGE_BASE_URL_OF_LARGE_LANGUAGE_MODEL_SERVER: "http://llama-cpp-server-service:8080"
  TEXT_TO_IMAGE_TIMEOUT_FOR_REQUESTS_TO_LARGE_LANGUAGE_MODEL_IN_SECONDS: "30.0"
  TEXT_TO_IMAGE_LARGE_LANGUAGE_MODEL_TEMPERATURE: "0.7"
  TEXT_TO_IMAGE_MAXIMUM_TOKENS_GENERATED_BY_LARGE_LANGUAGE_MODEL: "512"
  TEXT_TO_IMAGE_SIZE_OF_CONNECTION_POOL_FOR_LARGE_LANGUAGE_MODEL: "10"
  TEXT_TO_IMAGE_MAXIMUM_NUMBER_OF_BYTES_OF_RESPONSE_BODY_FROM_LARGE_LANGUAGE_MODEL: "1048576"

  # Stable Diffusion settings
  TEXT_TO_IMAGE_ID_OF_STABLE_DIFFUSION_MODEL: "stable-diffusion-v1-5/stable-diffusion-v1-5"
  TEXT_TO_IMAGE_REVISION_OF_STABLE_DIFFUSION_MODEL: "39593d5650112b4cc580433f6b0435385882d819"
  TEXT_TO_IMAGE_STABLE_DIFFUSION_DEVICE: "auto"
  TEXT_TO_IMAGE_NUMBER_OF_INFERENCE_STEPS_OF_STABLE_DIFFUSION: "20"
  TEXT_TO_IMAGE_GUIDANCE_SCALE_OF_STABLE_DIFFUSION: "7.0"
  TEXT_TO_IMAGE_SAFETY_CHECKER_FOR_STABLE_DIFFUSION: "true"

  # Circuit breaker settings
  TEXT_TO_IMAGE_NUMBER_OF_CONSECUTIVE_FAILURES_TO_OPEN_CIRCUIT_BREAKER_FOR_LARGE_LANGUAGE_MODEL: "5"
  TEXT_TO_IMAGE_RECOVERY_TIMEOUT_OF_CIRCUIT_BREAKER_FOR_LARGE_LANGUAGE_MODEL_IN_SECONDS: "30.0"

  # Admission control and resilience settings
  TEXT_TO_IMAGE_RETRY_AFTER_NOT_READY_IN_SECONDS: "10"
  TEXT_TO_IMAGE_MAXIMUM_NUMBER_OF_BYTES_OF_REQUEST_PAYLOAD: "1048576"
